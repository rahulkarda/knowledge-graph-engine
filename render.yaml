services:
  - type: web
    name: knowledge-graph-engine
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./knowledge_graph.db
      - key: QDRANT_URL
        value: http://localhost:6333
      - key: ENVIRONMENT
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: '["https://knowledge-graph-engine-4czt68x4o.vercel.app","https://knowledge-graph-engine-alhmi4n7h.vercel.app","https://knowledge-graph-engine.vercel.app","https://frontend-murex-three-13.vercel.app","http://localhost:5173","http://localhost:3000"]'
      - key: PYTHON_VERSION
        value: "3.12.0"
    healthCheckPath: /health
    plan: free
